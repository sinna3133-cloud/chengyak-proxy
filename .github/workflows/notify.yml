name: 청약 마감 알림 발송

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 한국시간 오전 9시 (UTC 0시)
  workflow_dispatch:      # 수동 실행 가능

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: 알림 발송
        run: |
          curl -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://chengyak-proxy.vercel.app/api/notify
